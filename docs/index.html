            </div>

<script>
    //听力题！
    var $input_list = [];

    var inputLisn1 = $("#topics-lisn-1").find(".topics-right").find("input");
    var inputLisn2 = $("#topics-lisn-2").find(".topics-right").find("input");
    var inputRD1 = $("#topics-rd-1").find(".topics-right").find("input");
    var inputRD2 =  $("#topics-rd-2").find(".topics-right").find("input");
    var inputRD3 =  $("#topics-rd-3").find(".topics-right").find("input");
    var inputTrans =  $("#topics-trans").find(".topics-right").find("input");
    var inputWtr =  $("#topics-wrt").find(".topics-right").find("input");

    $input_list.push(inputLisn1);
    $input_list.push(inputLisn2);
    $input_list.push(inputRD1);
    $input_list.push(inputRD2);
    $input_list.push(inputRD3);
    $input_list.push(inputTrans);
    $input_list.push(inputWtr);

    inputLisn1.on("blur",function(){
        $(this).removeClass("border-bottom-red");
        if($(this).val()<0){
            $(this).val(0)
        }else if($(this).val()>15){
            $(this).val(15);
        }
    });

    inputLisn2.on("blur",function(){
        $(this).removeClass("border-bottom-red");
        if($(this).val()<0){
            $(this).val(0)
        }else if($(this).val()>10){
            $(this).val(10);
        }
    });

    inputRD1.on("blur",function(){
        $(this).removeClass("border-bottom-red");
        if($(this).val()<0){
            $(this).val(0)
        }else if($(this).val()>10){
            $(this).val(10);
        }
    });
    inputRD2.on("blur",function(){
        $(this).removeClass("border-bottom-red");
        if($(this).val()<0){
            $(this).val(0)
        }else if($(this).val()>10){
            $(this).val(10);
        }
    });
    inputRD3.on("blur",function(){
        $(this).removeClass("border-bottom-red");
        if($(this).val()<0){
            $(this).val(0)
        }else if($(this).val()>10){
            $(this).val(10);
        }
    });
    inputTrans.on("blur",function(){
        $(this).removeClass("border-bottom-red");
        if($(this).val()<0){
            $(this).val(0)
        }else if($(this).val()>15){
            $(this).val(15);
        }
    });
    inputWtr.on("blur",function(){
        $(this).removeClass("border-bottom-red");
        if($(this).val()<0){
            $(this).val(0)
        }else if($(this).val()>15){
            $(this).val(15);
        }
    });

    //验证数据是否合法
    function yuanyuan_illegal($input)
    {
        if($input.val() == "" || isNaN($input.val())){
            $input.addClass("border-bottom-red");
            $input.attr("placeholder","");
            return false;
        }

        return true;
    }

    //点击事件!
    $("#calc-score").click(function(){
        var $input,
            flag = true;
    
        //验证用户表单是否合法 表单填写!
        for(var i = 0, length = $input_list.length; i < length; i++)
        {
            $input = $input_list[i];

            if(false == yuanyuan_illegal($input))
            {
                flag = false;
            }
        }

        //如果用户都填写好了表单那么进入分数页面
        if(flag)
        {
            $(".fixedContainer").hide();
            $(".topics-setting").hide();
            $("#report-container").show();
            $("#re-calc-score").css("top",$("#report-container").height() + 48 +24 +'px').css("left",($(window).width()-$("#re-calc-score").width())/2);
            refreshScore();
        }
    });

    $("#re-calc-score").click(function(){
        $(".topics-setting").show();
        $("#report-container").hide();
    })

    $(".exam-module-head-name").css("top",-(($(".exam-module-head-name").height()+18)/2)).css("left",($(".exam-module-head").width()-$(".exam-module-head-name").width()-28)/2);

    //各部分分数!
    //var topicsLisnScore = 145;
    //听力1 占总分数 15%      听力2 占总分数 20%    35%=>248.5即145
    var topicsLisn1Score = 62;
    var topicsLisn2Score = 83;

    var topicsRD1Score = 21;
    var topicsRD2Score = 42;
    var topicsRD3Score = 84;
    var topicsTransScore = 64;
    var topicsWtrScore = 64;

    //刷新分数!
    function refreshScore()
    {
        var rightLisn1 = $("#topics-lisn-1").find(".topics-right").find("input").val();
        var rightLisn2 = $("#topics-lisn-2").find(".topics-right").find("input").val();

        var rightRD1 =  $("#topics-rd-1").find(".topics-right").find("input").val();
        var rightRD2 =  $("#topics-rd-2").find(".topics-right").find("input").val();
        var rightRD3 =  $("#topics-rd-3").find(".topics-right").find("input").val();
        var rightTrans =  $("#topics-trans").find(".topics-right").find("input").val();
        var rightWtr =  $("#topics-wrt").find(".topics-right").find("input").val();

        console.log(rightLisn1, rightLisn2, rightRD1, rightRD2,rightRD3,rightTrans,rightWtr, 'right');

        var maxLisn1 = $("#topics-lisn-1")[0].dataset["max"];
        var maxLisn2 = $("#topics-lisn-2")[0].dataset["max"];

        var maxRD1 = $("#topics-rd-1")[0].dataset["max"];
        var maxRD2 = $("#topics-rd-2")[0].dataset["max"];
        var maxRD3 = $("#topics-rd-3")[0].dataset["max"];
        var maxTrans = $("#topics-trans")[0].dataset["max"];
        var maxWtr = $("#topics-wrt")[0].dataset["max"];

        console.log(maxLisn1, maxLisn2, maxRD1,maxRD2,maxRD3,maxTrans,maxWtr,"max");

        //更具面板获取分数
        var scoreLisn1 = Math.round((parseFloat(rightLisn1)/parseInt(maxLisn1))*topicsLisn1Score);
        var scoreLisn2 = Math.round((parseFloat(rightLisn2)/parseInt(maxLisn2))*topicsLisn2Score);

        var scoreRD1 = Math.round((parseFloat(rightRD1)/parseInt(maxRD1))*topicsRD1Score);
        var scoreRD2 = Math.round((parseFloat(rightRD2)/parseInt(maxRD2))*topicsRD2Score);
        var scoreRD3 = Math.round((parseFloat(rightRD3)/parseInt(maxRD3))*topicsRD3Score);
        var scoreTrans = Math.round((parseFloat(rightTrans)/parseInt(maxTrans))*topicsTransScore);
        var scoreWtr = Math.round((parseFloat(rightWtr)/parseInt(maxWtr))*topicsWtrScore);

        console.log(topicsLisn1Score, topicsLisn2Score,topicsRD1Score,topicsRD2Score,topicsRD3Score,topicsTransScore,topicsWtrScore,"topicsScore");
        console.log(scoreLisn1, scoreLisn2, scoreRD1,scoreRD2,scoreRD3,scoreTrans,scoreWtr,"score");

        //分数修正!
        scoreLisn = scoreLisn1 + scoreLisn2 + 100;
        var scoreRD = scoreRD1 + scoreRD2 + scoreRD3 + 100;
        var scoreTransWtr = scoreTrans + scoreWtr + 90;

        var totalScore = scoreLisn + scoreRD + scoreTransWtr;


        if(totalScore >= 600)
        {
//            totalScore = Math.round(totalScore*0.93);
            scoreLisn = Math.round(scoreLisn*0.93);
            scoreRD = Math.round(scoreRD*0.93);
            scoreTransWtr = Math.round(scoreTransWtr*0.93);
            totalScore = scoreLisn + scoreRD + scoreTransWtr;
        }
        else if(totalScore >= 500)
        {
//            totalScore = Math.round(totalScore*0.88);
            scoreLisn = Math.round(scoreLisn*0.88);
            scoreRD = Math.round(scoreRD*0.88);
            scoreTransWtr = Math.round(scoreTransWtr*0.88);
            totalScore = scoreLisn + scoreRD + scoreTransWtr;
        }
        else
        {
//            totalScore = Math.round(totalScore*0.9);
            scoreLisn = Math.round(scoreLisn*0.9);
            scoreRD = Math.round(scoreRD*0.9);
            scoreTransWtr = Math.round(scoreTransWtr*0.9);
            totalScore = scoreLisn + scoreRD + scoreTransWtr;
        }

        if(totalScore > 710)
        {
            totalScore = 710;
        }

        var totalScoreLow = totalScore - 15;
        var totalScoreHight = totalScore + 15;
        if((totalScoreLow < 425 && totalScore > 425) || totalScoreLow < 290)
        {
            totalScoreLow = totalScore;
        }

        if(totalScoreHight > 710)
        {
            totalScoreHight = 710;
        }

        $(".report-total-score").html(totalScore);
        $(".score-detail").find("tbody").find("tr").html("<td>"+scoreLisn+"</td><td>"+scoreRD+"</td><td>"+scoreTransWtr+"</td>");
        $(".report-desc").html("*预估你当前水平在 "+totalScoreLow+" -"+totalScoreHight+"分");
    }

    $(".topics-plus").click(function(){
        var moduleObj = $(this).parents(".exam-module-topics");
        if(moduleObj.length == 0)
        {
            return;
        }
        var max = parseInt(moduleObj[0].dataset["max"]);
        incrNum(moduleObj, max);
    });

    $(".topics-sub").click(function(){
        var moduleObj = $(this).parents(".exam-module-topics");
        if(moduleObj.length == 0)
        {
            return;
        }
        var max = parseInt(moduleObj[0].dataset["max"]);
        descNum(moduleObj, max);
    });

    function incrNum(moduleObj, max)
    {
        var right = moduleObj.find(".topics-right").html();
        right = parseInt(right) + 1;
        console.log(right);
        if(right > max)
        {
            return;
        }

        var wrong = max-right;
        moduleObj.find(".topics-right").html(right);
        moduleObj.find(".topics-wrong").html(wrong);
    }

    function descNum(muduleObj, max)
    {
        var right = muduleObj.find(".topics-right").html();
        right = parseInt(right) - 1;
        if(right < 0)
        {
            return;
        }

        var wrong = max-right;
        muduleObj.find(".topics-right").html(right);
        muduleObj.find(".topics-wrong").html(wrong);
    }
</script>
</html>
